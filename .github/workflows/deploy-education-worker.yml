name: Deploy Education API Worker

on:
  push:
    branches: [main]
    paths:
      - "cloudflare-workers/education-proxy/**"
      - "lib/education-api.ts"
  workflow_dispatch:

jobs:
  deploy-worker:
    name: Cloudflare Worker (same-origin /api/education)
    runs-on: ubuntu-latest
    if: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Deploy worker
        working-directory: cloudflare-workers/education-proxy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler@3 deploy
