name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

# Required permissions for GitHub Pages deployment
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Next.js
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build & export static site
        run: npm run build
        env:
          # Public env vars baked into the static bundle
          NEXT_PUBLIC_SITE_URL: https://brahmando.com
          NEXT_PUBLIC_SITE_NAME: Brahmando
          NEXT_PUBLIC_CHAT_API_URL: https://chat.brahmando.com/api/chat/stream
          NEXT_PUBLIC_RUN_AGENT_API_URL: https://chat.brahmando.com/api/run-agent
          NEXT_PUBLIC_PLATFORM_HEALTH_URL: https://chat.brahmando.com/api/platform-health
          NEXT_PUBLIC_EDUCATION_API_URL: https://chat.brahmando.com/api/education
          NEXT_PUBLIC_EDGE_API_URL: https://api.brahmando.com
          NEXT_PUBLIC_N8N_URL: https://n8n.brahmando.com

      - name: Copy CNAME to output directory
        run: cp public/CNAME out/CNAME

      - name: Add .nojekyll
        run: cp .nojekyll out/.nojekyll 2>/dev/null || touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
