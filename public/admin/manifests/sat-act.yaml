apiVersion: education.brahmando.com/v1
kind: SkuManifest

metadata:
  id: sat-act
  displayName: SAT / ACT Preparation Suite
  status: draft
  owner: yogabrata
  description: Manifest-driven SAT/ACT microservice — Digital SAT + ACT official prep pipeline

exam:
  providers: [CollegeBoard, ACT]
  locale: us-uk
  currency: USD

domains:
  - id: sat-reading-writing
    label: SAT Reading & Writing
  - id: sat-math
    label: SAT Math
  - id: act-english
    label: ACT English
  - id: act-math
    label: ACT Math
  - id: act-reading
    label: ACT Reading
  - id: act-science
    label: ACT Science

questionTypes:
  - MCQ
  - passage
  - grid-in

curriculum:
  version: v1
  effectiveDate: 2026-08-01
  taxonomy:
    source: python-export
    module: modules.sat_act.catalog.curriculum_export
    file: taxonomy/sat-act-v1.json
  previousVersions: []

questionBank:
  version: v1
  effectiveDate: 2026-08-01
  minVerifiedForPublish: 50
  attributes:
    - id
    - track
    - section
    - skill
    - questionType
    - difficulty
    - sourceChain
    - curriculumVersion

crawler:
  officialSources:
    - url: https://www.collegeboard.org/
      authority: 100
      label: College Board
    - url: https://www.act.org/
      authority: 100
      label: ACT
  youtubeChannels:
    - name: Khan Academy
      authority: 95
  allowedDomains:
    - collegeboard.org
    - bluebook.collegeboard.org
    - act.org
    - khanacademy.org
    - princetonreview.com
    - kaptest.com
    - prepscholar.com
  minAuthorityScore: 80
  schedule: "0 4 * * *"

knowledge:
  collection: sat_act_kb
  knowledgeObjectSchema: v1
  dedupThreshold: 0.92
  reviewRequired: true

coverage:
  enabled: true
  minSkillCoveragePercent: 75
  reportPath: coverage/sat-act/coverage-report.json

diagramPolicy:
  mode: mermaid_allowed
  types:
    - passage-layout
    - graph
    - geometry

features:
  studyRoom: true
  forum: true
  mockTests: true
  teacherAudio: true
  materialNarration: true
  sahadevaAssistant: false

videoPolicy:
  embedAllowed:
    - youtube.com
    - youtube-nocookie.com
  maxPerChapter: 5
  requireTranscript: true

practice:
  modes:
    - id: skill-drill
      count: 5
    - id: section-mock
      timed: true
    - id: full-test
      timed: true
  scoring: official-keys-only

api:
  edgePath: /education/sat-act
  abhyasBase: /education/abhyas/v2
  educationBase: /education
  scopes:
    - sat_act_saas

portal:
  hubTemplate: education-shell
  exportDir: portal/data/
  rosterPath: /portal/data/us-uk-academy-bots.json

outputs:
  - curriculum.json
  - portal-sku-config.json
  - crawler-seeds.yaml
  - coverage-report.json
